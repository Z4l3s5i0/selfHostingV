global:
  scrape_interval: 2s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'immich-api'
    static_configs:
      - targets: ['immich-server:8081']

  - job_name: 'immich-microservices'
    static_configs:
      - targets: ['immich-server:8082']
